map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name api.tryride.ng admin.tryride.ng tryride.ng www.tryride.ng novapath.ng www.novapath.ng;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.tryride.ng;

    ssl_certificate /etc/letsencrypt/live/api.tryride.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tryride.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # No add_header block here (unlike the static-site server blocks below)
    # — this proxies straight to the NestJS app, which already sets its own
    # security headers via helmet (see main.ts). Duplicating them here would
    # just produce two X-Frame-Options/HSTS headers on every response.

    location / {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for socket.io (real-time trip offers to drivers) to
        # upgrade the HTTP connection to a WebSocket through this proxy.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

server {
    listen 443 ssl;
    server_name admin.tryride.ng;

    ssl_certificate /etc/letsencrypt/live/api.tryride.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tryride.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Reduces the blast radius of a future XSS bug — the admin JWT lives in
    # localStorage (not httpOnly), so a script-injection vector here would
    # otherwise be able to read it directly. frame-ancestors 'none' also
    # stops this internal ops tool from ever being iframed for clickjacking.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.tryride.ng; frame-ancestors 'none'" always;
    # This is a small, actively-iterated static site — a stale-cache visitor
    # seeing an old HTML/CSS/JS mismatch (e.g. new markup with old styling)
    # is a worse failure mode than the bandwidth cost of always revalidating.
    add_header Cache-Control "no-cache, must-revalidate" always;

    root /usr/share/nginx/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name tryride.ng www.tryride.ng;

    ssl_certificate /etc/letsencrypt/live/tryride.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tryride.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.tryride.ng; frame-ancestors 'none'" always;
    # This is a small, actively-iterated static site — a stale-cache visitor
    # seeing an old HTML/CSS/JS mismatch (e.g. new markup with old styling)
    # is a worse failure mode than the bandwidth cost of always revalidating.
    add_header Cache-Control "no-cache, must-revalidate" always;

    root /usr/share/nginx/tryride;
    index index.html;

    # Plain multi-page static site — .html files are served directly by
    # path, no SPA fallback needed (unlike the admin dashboard above).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name novapath.ng www.novapath.ng;

    ssl_certificate /etc/letsencrypt/live/tryride.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tryride.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-ancestors 'none'" always;
    add_header Cache-Control "no-cache, must-revalidate" always;

    root /usr/share/nginx/novapath;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
