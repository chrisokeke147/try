version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: try
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-try}
      POSTGRES_DB: try
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgres://try:${POSTGRES_PASSWORD:-try}@postgres:5432/try
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ../../admin-dashboard-dist:/usr/share/nginx/admin:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  certbot_www:
  certbot_conf:
